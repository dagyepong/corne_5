# --- POWER & RANGE ---
# Increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- DEBOUNCE ---
# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# --- STUDIO ---
# Enable ZMK Studio for Realtime Keymap Updates
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_STUDIO_LOCKING=n

# --- STABILITY FIXES (REQUIRED FOR INTEL CHIPS) ---
# Disable experimental features that trigger Intel driver panics
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n

# Force standard data rates to avoid firmware crashes
CONFIG_BT_CTLR_PHY_2M=n

# Set connection intervals that Intel chips handle gracefully
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=18

# --- OPTIONAL: Uncomment to enable deep sleep ---
# CONFIG_ZMK_SLEEP=y
